version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cfpb-exploration
    environment:
      - PYTHONUNBUFFERED=1
      # Add your environment variables here or use .env file
    volumes:
      # Mount source code for development (comment out for production)
      - ./src:/app/src:ro
      # Mount logs directory
      - ./logs:/app/logs
    ports:
      # Customize ports as needed
      - "8000:8000"
    # Uncomment and customize command as needed
    # command: python -m cfpb-exploration
    restart: unless-stopped

  # Example: Add PostgreSQL database
