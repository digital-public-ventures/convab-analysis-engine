# - Update cache paths for your package manager

name: Test

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs when a new run is triggered on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

