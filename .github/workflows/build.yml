  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write # Required to create releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Download build artifacts if you uploaded them in the build job
      # - name: Download artifacts
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: python-package  # or npm-package, go-binaries, etc.
      #     path: dist/

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract version-specific changelog from CHANGELOG.md
          # This assumes you use Keep a Changelog format
          VERSION=${{ needs.build.outputs.version }}

          # If CHANGELOG.md exists, extract the section for this version
          if [ -f CHANGELOG.md ]; then
            # Extract from "## [version]" to the next "## [" or end of file
            NOTES=$(sed -n "/## \[$VERSION\]/,/## \[/{/## \[/!p;}" CHANGELOG.md | sed '$ d')
            
            if [ -n "$NOTES" ]; then
              echo "Found changelog for version $VERSION"
              # Save to file for multi-line content
              echo "$NOTES" > /tmp/release-notes.md
            else
              echo "No specific changelog found for version $VERSION, using auto-generated notes"
              echo "See [CHANGELOG.md](CHANGELOG.md) for details." > /tmp/release-notes.md
            fi
          else
            echo "No CHANGELOG.md found, using auto-generated notes"
            echo "See commit history for details." > /tmp/release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ needs.build.outputs.version }}
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: ${{ contains(needs.build.outputs.version, '-') }} # Mark pre-releases (alpha, beta, rc)
          generate_release_notes: true # Auto-generate from commits
          # Uncomment to attach build artifacts to the release
          # files: |
          #   dist/*

