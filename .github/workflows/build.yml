# Build Workflow
#
# Builds artifacts and creates GitHub releases when tags are pushed
# Runs on semantic version tags (e.g., v1.2.3, v2.0.0-beta.1)
#
# CUSTOMIZATION REQUIRED:
# - Replace placeholder build commands with your project's actual commands
# - Configure artifact paths
# - Adjust release asset names
# - Customize release notes generation

name: Build

on:
  push:
    tags:
      - 'v*.*.*' # Semantic version tags (v1.2.3)
  workflow_dispatch: # Allow manual trigger for testing

# Ensure only one build runs at a time per tag
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # Don't cancel release builds

jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for changelog generation

      - name: Extract version from tag
        id: version
        run: |
          # Extract version from tag (remove 'v' prefix)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

