# Security Workflow
#
# Automated security scanning for vulnerabilities
# Includes: dependency scanning, secret scanning, SAST, and license compliance
#
# Runs on:
# - Schedule (daily)
# - Pull requests
# - Manual trigger
#
# CUSTOMIZATION REQUIRED:
# - Enable Dependabot in repository settings
# - Configure CodeQL for your language (if applicable)
# - Add additional security scanners as needed
# - Set up security alert notifications

name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

# Limit concurrent security scans
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # Required for uploading SARIF results
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # GitHub automatically runs Dependabot if enabled in settings
      # This job provides additional dependency scanning

