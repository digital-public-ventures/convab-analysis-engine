      # FOSSA (comprehensive license scanning - requires FOSSA_API_KEY):
      # - name: Run FOSSA analysis
      #   uses: fossas/fossa-action@main
      #   with:
      #     api-key: ${{ secrets.FOSSA_API_KEY }}

      - name: Placeholder - Configure license compliance
        run: |
          echo "TODO: Configure license compliance scanning"
          echo "Consider: pip-licenses, license-checker, FOSSA, etc."

  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    if: hashFiles('Dockerfile') != ''  # Only run if Dockerfile exists
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Trivy (comprehensive container scanner)
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'  # Filesystem scan
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      # If you build Docker images, scan them too:
      # - name: Build Docker image
      #   run: docker build -t myapp:${{ github.sha }} .
      #
      # - name: Scan Docker image with Trivy
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     image-ref: 'myapp:${{ github.sha }}'
      #     format: 'sarif'
      #     output: 'trivy-image-results.sarif'
      #
      # - name: Upload image scan results
      #   uses: github/codeql-action/upload-sarif@v3
      #   with:
      #     sarif_file: 'trivy-image-results.sarif'

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-scan, secret-scan, sast, license-compliance, container-scan]
    if: always()  # Run even if some jobs fail
    
    steps:
      - name: Generate summary
        run: |
          echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scan | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST | ${{ needs.sast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License Compliance | ${{ needs.license-compliance.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container Scan | ${{ needs.container-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Review the Security tab for detailed findings." >> $GITHUB_STEP_SUMMARY

      # Optional: Fail the workflow if critical scans failed
