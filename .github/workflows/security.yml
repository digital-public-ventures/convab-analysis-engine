          echo "Enable Dependabot in Settings > Security > Dependabot"

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for complete scanning

      # GitHub Secret Scanning is available for public repos and GitHub Advanced Security
      # This job provides additional scanning with Gitleaks

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # Optional: for Gitleaks+

      # Alternative: TruffleHog
      # - name: TruffleHog OSS
      #   uses: trufflesecurity/trufflehog@main
      #   with:
      #     path: ./
      #     base: ${{ github.event.repository.default_branch }}
      #     head: HEAD

  sast:
    name: Static Application Security Testing
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # CodeQL (supports multiple languages)
      # Uncomment and configure for your language
      # - name: Initialize CodeQL
      #   uses: github/codeql-action/init@v3
      #   with:
      #     languages: python  # or javascript, typescript, java, go, etc.
      #     # For compiled languages, add build steps here
      #
      # - name: Autobuild
      #   uses: github/codeql-action/autobuild@v3
      #   # Or replace with manual build steps:
      #   # - run: |
      #   #     make bootstrap
      #   #     make release
      #
      # - name: Perform CodeQL Analysis
      #   uses: github/codeql-action/analyze@v3

      # Semgrep (multi-language SAST)
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: auto  # Use Semgrep's recommended rules
          # Or specify custom rulesets:
          # config: >-
          #   p/security-audit
          #   p/secrets
          #   p/owasp-top-ten
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}  # Optional: for Semgrep Cloud
        continue-on-error: true  # Don't fail builds on findings

      # Bandit (Python-specific SAST)
