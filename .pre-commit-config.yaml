# Pre-commit hooks configuration
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

# To install: pre-commit install
# To update: pre-commit autoupdate
# To run manually: pre-commit run --all-files

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Prevent large files from being committed
      - id: check-added-large-files
        args: ['--maxkb=1000']

      # Check for files that would conflict in case-insensitive filesystems
      - id: check-case-conflict

      # Ensure files end with a newline
      - id: end-of-file-fixer
        exclude: '\.svg$'

      # Trim trailing whitespace
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]

      # Check YAML syntax
      - id: check-yaml
        exclude: 'templates/.*\.yaml$' # Exclude template files with placeholders

      # Check JSON syntax
      - id: check-json

      # Check TOML syntax
      - id: check-toml

      # Prevent committing to main/master
      - id: no-commit-to-branch
        args: ['--branch', 'main', '--branch', 'master']

      # Check for merge conflict markers
      - id: check-merge-conflict

      # Check for debug statements (Python)
      - id: debug-statements

      # Detect private keys
      - id: detect-private-key

      # Fix mixed line endings
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Secret scanning
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        exclude: |
          (?x)^(
            package-lock\.json|
            yarn\.lock|
            poetry\.lock|
            .*\.min\.js|
            .*\.map
          )$

  # Python-specific hooks (if using Python)
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3
        args: ['--line-length=100']

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile', 'black', '--line-length', '100']

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ['--max-line-length=100', '--extend-ignore=E203,W503']

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: ['--ignore-missing-imports', '--no-strict-optional', '--python-version=3.11']
        exclude: '^\.github/skills/'

  # JavaScript/TypeScript-specific hooks (if using Node.js)
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        files: \.[jt]sx?$
        types: [file]
        additional_dependencies:
          - eslint@8.56.0
          - eslint-config-prettier@9.1.0

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: \.(js|ts|jsx|tsx|json|css|scss|md|yaml|yml)$
        exclude: |
          (?x)^(
            package-lock\.json|
            yarn\.lock|
            .*\.min\.js|
            \.github/skills/.*\.md
          )$

  # Go-specific hooks (if using Go)
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-vet
      - id: go-imports
      - id: go-cyclo
        args: ['-over=15']
      - id: golangci-lint
        args: ['--timeout=5m']

  # Rust-specific hooks (if using Rust)
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
        args: ['--manifest-path', 'Cargo.toml', '--', '--check']
      - id: clippy
        args: ['--manifest-path', 'Cargo.toml', '--', '-D', 'warnings']

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.38.0
    hooks:
      - id: markdownlint
        args: ['--fix']
        exclude: 'CHANGELOG\.md'

  # Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint
        args: ['--ignore', 'DL3008', '--ignore', 'DL3009']

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck

  # Commit message linting (conventional commits)
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: ['--force-scope']

# Configuration for local hooks (project-specific)
# Uncomment and customize as needed
# - repo: local
#   hooks:
#     - id: tests
#       name: run tests
#       entry: make test
#       language: system
#       pass_filenames: false
#       always_run: true
#
#     - id: build
#       name: check build
#       entry: make build
#       language: system
#       pass_filenames: false
#       files: \.(go|rs|py|js|ts)$

# Exclude patterns (global)
exclude: |
  (?x)^(
    \.git/|
    \.venv/|
    venv/|
    node_modules/|
    build/|
    dist/|
    \.eggs/|
    .*\.egg-info/|
    __pycache__/|
    \.pytest_cache/|
    \.mypy_cache/|
    target/|
    vendor/|
    temp/output/|
    temp/debug/
  )$
